<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CRM — Grupo Clavijo</title>
<meta name="theme-color" content="#0F2340">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CRM Clavijo">
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#F2EEE8;display:flex;min-height:100vh}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit;outline:none}
.sidebar{width:210px;background:#0F2340;display:flex;flex-direction:column;min-height:100vh;position:sticky;top:0;max-height:100vh;overflow-y:auto}
.logo{padding:24px 20px 16px}
.logo-sub{font-size:10px;font-weight:700;color:#C9974A;letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}
.logo-title{font-size:18px;font-weight:800;color:#fff;line-height:1.2}
.divider{margin:0 20px 12px;height:1px;background:rgba(201,151,74,.3)}
.nav-btn{display:block;width:100%;padding:11px 14px;border-radius:8px;border:none;background:none;color:#7A9BB5;font-size:14px;font-weight:500;margin-bottom:2px;text-align:left;border-left:3px solid transparent;transition:all .15s}
.nav-btn.active{background:rgba(201,151,74,.15);color:#C9974A;font-weight:700;border-left-color:#C9974A}
.content{flex:1;padding:32px 36px;overflow-y:auto}
.page-title{font-size:26px;font-weight:800;color:#0F2340;margin-bottom:4px}
.page-sub{color:#7A8499;font-size:14px;margin-bottom:28px}
.card{background:#FAFAF7;border:1.5px solid #E8E4DC;border-radius:12px;overflow:hidden;margin-bottom:12px}
.card-header{background:#0F2340;padding:14px 20px;display:flex;justify-content:space-between;align-items:center}
.card-header h3{color:#fff;font-size:14px;font-weight:700}
.card-body{padding:16px 20px}
.row{display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding:16px 20px;background:#FAFAF7;border:1.5px solid #E8E4DC;border-radius:10px;margin-bottom:10px}
.field-label{font-size:11px;color:#7A8499;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.field-value{font-size:13px;color:#3A4455}
.field-value.bold{font-weight:700;color:#0F2340}
.badge{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;display:inline-block}
.badge-green{background:#D6F0E0;color:#1A7A3C}
.badge-blue{background:#D6E6FF;color:#1A4A9A}
.badge-orange{background:#FFE8CC;color:#8A4A00}
.badge-red{background:#FFD6D6;color:#8A1A1A}
.badge-gray{background:#E8E4DC;color:#5A6478}
.badge-gold{background:#FFF0D6;color:#7A5200}
.btn-primary{background:#C9974A;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-weight:700;font-size:14px}
.btn-dark{background:#0F2340;color:#fff;border:none;border-radius:7px;padding:8px 14px;font-weight:600;font-size:13px}
.btn-cancel{padding:10px 20px;border:1.5px solid #D8D4CC;border-radius:8px;background:none;font-weight:600;color:#5A6478;font-size:14px}
.btn-delete{background:none;border:1.5px solid #FFD6D6;border-radius:7px;padding:8px 10px;color:#8A1A1A;font-size:13px}
.btn-save{background:#0F2340;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-weight:700;font-size:14px}
.inp{width:100%;padding:10px 12px;border:1.5px solid #D8D4CC;border-radius:8px;font-size:14px;color:#0F2340;background:#fff}
.inp:focus{border-color:#0F2340}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.fl{font-size:12px;font-weight:600;color:#5A6478;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:block}
.fld{margin-bottom:16px}
.modal-overlay{position:fixed;inset:0;background:rgba(15,35,64,.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#FAFAF7;border-radius:12px;width:100%;max-width:560px;max-height:90vh;overflow:auto;box-shadow:0 24px 64px rgba(15,35,64,.25)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px;border-bottom:1px solid #E8E4DC}
.modal-header h2{margin:0;font-size:18px;font-weight:700;color:#0F2340}
.modal-body{padding:24px}
.modal-footer{display:flex;gap:12px;justify-content:flex-end;margin-top:8px}
.stat-card{border-radius:12px;padding:20px 24px}
.stat-card.accent{background:#0F2340}
.stat-card.normal{background:#FAFAF7;border:1.5px solid #E8E4DC}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:16px;margin-bottom:32px}
.search-inp{padding:10px 12px;border:1.5px solid #D8D4CC;border-radius:8px;font-size:14px;color:#0F2340;background:#fff;margin-bottom:20px;width:100%;max-width:360px}
.progress-bar-wrap{height:10px;background:#E8E4DC;border-radius:5px;overflow:hidden}
.progress-bar{height:100%;border-radius:5px;transition:width .4s}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px 16px;font-size:11px;font-weight:700;color:#7A8499;text-transform:uppercase;letter-spacing:.06em;background:#F2EEE8}
td{padding:12px 16px;font-size:13px;color:#3A4455;border-top:1px solid #F0EDE6}
/* Mobile */
@media(max-width:768px){
  body{flex-direction:column}
  .sidebar{width:100%;min-height:auto;max-height:none;position:relative;flex-direction:column}
  .logo{padding:16px 16px 8px;display:flex;align-items:center;gap:12px}
  .logo-title{font-size:15px}
  .divider{margin:0 16px 8px}
  nav#nav{display:flex;flex-direction:row;overflow-x:auto;padding:0 8px 8px;gap:4px;flex:none}
  .nav-btn{white-space:nowrap;padding:8px 12px;margin-bottom:0;border-left:none!important;border-bottom:3px solid transparent}
  .nav-btn.active{border-bottom-color:#C9974A;border-left:none}
  .content{padding:16px}
  .stats-grid{grid-template-columns:1fr 1fr}
  .grid2{grid-template-columns:1fr}
  .grid4{grid-template-columns:1fr 1fr}
  .row{gap:10px}
  .modal{max-width:100%;margin:0;border-radius:12px}
  .modal-overlay{padding:8px;align-items:flex-end}
  .card-header h3{font-size:12px}
  .page-title{font-size:20px}
}
@media(max-width:400px){
  .stats-grid{grid-template-columns:1fr}
  .grid4{grid-template-columns:1fr}
}
/* Export / Print */
@media print {
  .sidebar, .no-print { display:none!important }
  .content { padding:0 }
  body { background:#fff }
  .card { break-inside:avoid }
  .print-header { display:block!important }
}
.print-header { display:none }
.export-bar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; padding:14px 18px; background:#0F2340; border-radius:10px; align-items:center }
.export-bar span { color:#9BACC4; font-size:13px; font-weight:600; margin-right:4px }
.btn-export-pdf { background:#C9974A; color:#fff; border:none; border-radius:7px; padding:8px 14px; font-size:13px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:6px }
.btn-export-csv { background:rgba(255,255,255,0.1); color:#fff; border:1px solid rgba(255,255,255,0.2); border-radius:7px; padding:8px 14px; font-size:13px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:6px }
.btn-export-csv:hover { background:rgba(255,255,255,0.2) }
.btn-export-pdf:hover { background:#b8863e }
/* Save indicator */
.save-indicator{position:fixed;bottom:20px;right:20px;background:#0F2340;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.save-indicator.show{opacity:1}
</style>
</head>

// ── SHAREPOINT CONFIG ────────────────────────────────────────────────────────
const SP_CLIENT_ID = "5c95b5c3-d7d8-4f2a-9f73-4f697d6f9a5e";
const SP_SITE_PATH = "clavijocapital.sharepoint.com:/sites/GESTIONPROYECTOS";
const GRAPH = "https://graph.microsoft.com/v1.0";
const SP_LISTS = {clientes:"Clientes",inmuebles:"Inmuebles",llamadas:"Llamadas",visitas:"Visita",agentes:"Agentes"};

let SP_TOKEN = null;
let SP_SITE_ID = null;
let SP_LIST_IDS = {};
let SP_ITEM_IDS = {}; // local_id -> sharepoint item id

function spBuildAuthUrl() {
  const base = "https://login.microsoftonline.com/04989e12-e424-4375-8279-b5e1430e7058/oauth2/v2.0/authorize";
  const params = new URLSearchParams({
    client_id: SP_CLIENT_ID,
    response_type: "token",
    redirect_uri: window.location.origin + window.location.pathname,
    scope: "https://graph.microsoft.com/Sites.ReadWrite.All User.Read",
    response_mode: "fragment",
    prompt: "select_account"
  });
  return base + "?" + params.toString();
}

function spParseToken() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const token = params.get("access_token");
  const expires = params.get("expires_in");
  if (token) {
    const expiry = Date.now() + Number(expires) * 1000;
    sessionStorage.setItem("sp_token", token);
    sessionStorage.setItem("sp_expiry", String(expiry));
    window.history.replaceState(null, "", window.location.pathname);
    return token;
  }
  return null;
}

function spGetToken() {
  const t = sessionStorage.getItem("sp_token");
  const e = Number(sessionStorage.getItem("sp_expiry") || 0);
  return (t && Date.now() < e - 60000) ? t : null;
}

async function spFetch(url, opts) {
  const token = SP_TOKEN || spGetToken();
  if (!token) return null;
  const res = await fetch(url, {
    ...opts,
    headers: { Authorization: "Bearer " + token, "Content-Type": "application/json", ...(opts && opts.headers) }
  });
  if (!res.ok && res.status !== 204) {
    const err = await res.json().catch(() => ({}));
    console.error("SP API Error:", res.status, JSON.stringify(err));
    throw new Error(err.error?.message || res.statusText);
  }
  return res.status === 204 ? null : await res.json().catch(() => null);
}

async function spInit() {
  try {
    spSetStatus("connecting");
    // Get user info
    const me = await spFetch(GRAPH + "/me");
    if (!me) { spSetStatus("error", "No se pudo obtener el usuario"); return; }
    document.getElementById("sp-user").textContent = me.displayName || me.mail;
    // Get site ID
    const site = await spFetch(GRAPH + "/sites/" + SP_SITE_PATH);
    SP_SITE_ID = site.id;
    // Get list IDs
    for (const [key, name] of Object.entries(SP_LISTS)) {
      const lists = await spFetch(GRAPH + "/sites/" + SP_SITE_ID + "/lists?$filter=displayName eq '" + name + "'");
      SP_LIST_IDS[key] = lists.value[0]?.id;
    }
    spSetStatus("ok");
    document.getElementById("sp-load-btn").style.display = "block";
    document.getElementById("sp-login-btn").style.display = "none";
    document.getElementById("sp-logout-btn").style.display = "block";
  } catch(e) {
    spSetStatus("error", e.message);
  }
}

async function spLoadAll() {
  if (!SP_SITE_ID) return;
  spSetStatus("syncing");
  try {
    for (const [key, listId] of Object.entries(SP_LIST_IDS)) {
      if (!listId) continue;
      const data = await spFetch(GRAPH + "/sites/" + SP_SITE_ID + "/lists/" + listId + "/items?$expand=fields&$top=999");
      if (!data || !data.value) continue;
      DB[key] = data.value.map(item => {
        const obj = fromSpFields(item.fields);
        obj.id = item.id; // Keep SP item id as the local id
        obj._spId = item.id;
        // Also normalize field values - SP returns all as strings
        ["presupuesto_desde","presupuesto_hasta","presupuesto_reforma_inicial",
         "coste_reforma","gastos_generales","comision_venta","precio_compra","precio_venta",
         "habitaciones","metros","grado_avance"].forEach(f => {
          if (obj[f] !== undefined) obj[f] = Number(obj[f]) || 0;
        });
        // Parse numbers
        ["presupuesto_desde","presupuesto_hasta","presupuesto_reforma_inicial","coste_reforma",
         "gastos_generales","comision_venta","precio_compra","precio_venta","habitaciones",
         "metros","grado_avance","agente_id","cliente_id","inmueble_id"].forEach(f2 => {
          if (obj[f2] !== undefined) obj[f2] = Number(obj[f2]) || 0;
        });
        if (obj.activo !== undefined) obj.activo = obj.activo === true || obj.activo === "true" || obj.activo === "Sí";
        // Map SharePoint field names back to local names
        if (key === "clientes" && obj.tipo_cliente !== undefined) {
          obj.tipo = obj.tipo_cliente;
          delete obj.tipo_cliente;
        }
        if (key === "llamadas" && obj.tipo_llamada !== undefined) {
          obj.tipo = obj.tipo_llamada;
          delete obj.tipo_llamada;
        }
        return obj;
      });
    }
    spSetStatus("ok");
    renderPage();
    showToast("✓ Datos cargados desde SharePoint");
  } catch(e) {
    spSetStatus("error", e.message);
  }
}

// Convert local field names to SharePoint internal names (capitalize first letter)
function toSpFields(fields) {
  const out = {};
  Object.keys(fields).forEach(k => {
    // SharePoint internal name: first letter uppercase, rest as-is
    const spKey = k.charAt(0).toUpperCase() + k.slice(1);
    out[spKey] = fields[k];
  });
  return out;
}

// Convert SharePoint field names back to local names (lowercase first letter)
function fromSpFields(fields) {
  const out = {};
  Object.keys(fields).forEach(k => {
    if (k.startsWith("@") || k === "id") return;
    const localKey = k.charAt(0).toLowerCase() + k.slice(1);
    out[localKey] = fields[k];
  });
  return out;
}

async function spSaveItem(table, item, operation) {
  if (!SP_SITE_ID || !SP_LIST_IDS[table]) return;
  try {
    const raw = {...item};
    delete raw._spId;
    delete raw.id;
    // SharePoint field name mappings per table
    if (table === "clientes" && raw.tipo !== undefined) {
      raw.tipo_cliente = raw.tipo;
      delete raw.tipo;
    }
    if (table === "llamadas" && raw.tipo !== undefined) {
      raw.tipo_llamada = raw.tipo;
      delete raw.tipo;
    }
    // Clean fields for SharePoint - send all as strings to avoid type conflicts
    const cleaned = {};
    Object.keys(raw).forEach(k => {
      const v = raw[k];
      if (v === null || v === undefined) return;
      // Boolean - activo field
      if (k === "activo") { cleaned[k] = String(v === true || v === "true"); return; }
      // Dates - need ISO format
      if (k.includes("fecha") && v && String(v).length === 10) {
        cleaned[k] = v + "T00:00:00Z"; return;
      }
      // Skip empty dates
      if (k.includes("fecha") && !v) return;
      // Everything else as string
      cleaned[k] = String(v);
    });
    const fields = toSpFields(cleaned);
    if (operation === "ADD") {
      const res = await spFetch(GRAPH + "/sites/" + SP_SITE_ID + "/lists/" + SP_LIST_IDS[table] + "/items",
        { method: "POST", body: JSON.stringify({ fields }) });
      if (res) {
        // Update local item with SP id
        DB[table] = DB[table].map(x => x.id === item.id ? {...x, _spId: res.id} : x);
      }
    } else if (operation === "UPDATE" && item._spId) {
      await spFetch(GRAPH + "/sites/" + SP_SITE_ID + "/lists/" + SP_LIST_IDS[table] + "/items/" + item._spId + "/fields",
        { method: "PATCH", body: JSON.stringify(fields) });
    } else if (operation === "DELETE" && item._spId) {
      await spFetch(GRAPH + "/sites/" + SP_SITE_ID + "/lists/" + SP_LIST_IDS[table] + "/items/" + item._spId,
        { method: "DELETE" });
    }
  } catch(e) {
    showToast("⚠ Error en SharePoint: " + e.message);
  }
}

async function spExportAll() {
  if (!SP_SITE_ID || Object.keys(SP_LIST_IDS).length === 0) {
    showToast("⚠ Primero conéctate a SharePoint");

  }
  spSetStatus("syncing");
  showToast("⏳ Subiendo datos a SharePoint...");
  let total = 0;
  try {
    for (const [table, listId] of Object.entries(SP_LIST_IDS)) {
      if (!listId) continue;
      for (const item of DB[table]) {
        const fields = {...item};
        delete fields._spId;
        delete fields.id;
        // SharePoint field name mappings per table
        if (table === "clientes" && fields.tipo !== undefined) {
          fields.tipo_cliente = fields.tipo;
          delete fields.tipo;
        }
        if (table === "llamadas" && fields.tipo !== undefined) {
          fields.tipo_llamada = fields.tipo;
          delete fields.tipo;
        }
        const cleaned2 = {};
        Object.keys(fields).forEach(k => {
          const v = fields[k];
          if (v === null || v === undefined) return;
          if (k === "activo") { cleaned2[k] = String(v === true || v === "true"); return; }
          if (k.includes("fecha") && v && String(v).length === 10) {
            cleaned2[k] = v + "T00:00:00Z"; return;
          }
          if (k.includes("fecha") && !v) return;
          cleaned2[k] = String(v);
        });
        const spFields = toSpFields(cleaned2);
        console.log("Sending to SP list:", table, JSON.stringify(spFields));
        const res = await spFetch(
          GRAPH + "/sites/" + SP_SITE_ID + "/lists/" + listId + "/items",
          { method: "POST", body: JSON.stringify({ fields: spFields }) }
        );
        if (res) {
          DB[table] = DB[table].map(x => x.id === item.id ? {...x, _spId: res.id} : x);
          total++;
        }
      }
    }
    saveToLocal();
    spSetStatus("ok");
    showToast("✓ " + total + " registros subidos a SharePoint");
  } catch(e) {
    console.error("SP Export error:", e);
    spSetStatus("error", e.message);
    showToast("⚠ Error: " + e.message);
  }
}

function spSetStatus(status, msg) {
  const colors = { connecting:"#C9974A", syncing:"#1A4A9A", ok:"#1A7A3C", error:"#8A1A1A", idle:"#7A8499" };
  const labels = { connecting:"Conectando…", syncing:"Sincronizando…", ok:"Conectado", error:"Error", idle:"Sin conectar" };
  const dot = document.getElementById("sp-dot");
  const lbl = document.getElementById("sp-status-lbl");
  const err = document.getElementById("sp-error");
  if (dot) dot.style.background = colors[status] || "#7A8499";
  if (lbl) lbl.textContent = labels[status] || status;
  if (err) err.textContent = msg || "";
}

}

// ── HELPERS ───────────────────────────────────────────────────────────────────
const fmt = n => new Intl.NumberFormat("es-ES",{style:"currency",currency:"EUR",maximumFractionDigits:0}).format(n);
let currentPage = "dashboard";

function badge(text, color) {
  return `<span class="badge badge-${color}">${text}</span>`;
}
function estadoBadge(estado) {
  const map = {Activo:"green",Prospecto:"blue",Inactivo:"gray",Descartado:"red","En reforma":"orange","En venta":"blue","En negociación":"gold","En riesgo":"red",Vendido:"green",Reservado:"gold","Arras Firmadas":"gold",Comprado:"orange",Positiva:"green",Negativa:"red",Pendiente:"orange",Interesado:"green",Seguimiento:"blue","Primera contacto":"gray",Cierre:"gold","Solicitud Información":"blue","No responde en devolución":"gray","No encaja por presupuesto":"red","No encaja por zona":"red","Solo curioseando":"gray","Escalar a Gerencia":"gold",Perdido:"red"};
  return badge(estado, map[estado]||"gray");
}

function field(label, inputHtml) {
  return `<div class="fld"><label class="fl">${label}</label>${inputHtml}</div>`;
}
function inp(name, value, type="text", extra="") {
  return `<input class="inp" name="${name}" type="${type}" value="${(value||"").toString().replace(/"/g,'&quot;')}" ${extra}>`;
}
function sel(name, value, options, placeholder="— Seleccionar —") {
  const opts = (placeholder ? `<option value="">${placeholder}</option>` : "") + options.map(o => {
    const v = typeof o === "object" ? o.value : o;
    const l = typeof o === "object" ? o.label : o;
    return `<option value="${v}" ${v==value?"selected":""}>${l}</option>`;
  }).join("");
  return `<select class="inp" name="${name}">${opts}</select>`;
}
function textarea(name, value) {
  return `<textarea class="inp" name="${name}" style="min-height:80px;resize:vertical">${value||""}</textarea>`;
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function showModal(title, bodyHtml, onSave) {
  const el = document.createElement("div");
  el.className = "modal-overlay";
  el.innerHTML = `<div class="modal">
    <div class="modal-header"><h2>${title}</h2><button onclick="this.closest('.modal-overlay').remove()" style="background:none;border:none;font-size:20px;color:#7A8499">✕</button></div>
    <div class="modal-body">
      ${bodyHtml}
      <div class="modal-footer">
        <button class="btn-cancel" onclick="this.closest('.modal-overlay').remove()">Cancelar</button>
        <button class="btn-save" id="modal-save">Guardar</button>
      </div>
    </div>
  </div>`;
  document.body.appendChild(el);
  el.querySelector("#modal-save").onclick = () => {
    const data = {};
    el.querySelectorAll("[name]").forEach(i => {
      data[i.name] = i.type === "checkbox" ? i.checked : i.value;
    });
    if (onSave(data)) el.remove();
  };
  el.addEventListener("click", e => { if (e.target === el) el.remove(); });
}

// ── ALERTAS ───────────────────────────────────────────────────────────────────
function renderAlertas() {
  const alertas = [];
  const now = Date.now();

  // Inmuebles con fecha objetivo superada
  DB.inmuebles.forEach(im => {
    if (!im.fecha_objetivo || im.estado === "Vendido") return;
    const end = new Date(im.fecha_objetivo).getTime();
    if (now > end) {
      const dias = Math.ceil((now - end) / (1000*60*60*24));
      alertas.push({
        tipo: "riesgo",
        icono: "⏱",
        titulo: im.direccion,
        texto: `Fecha objetivo superada hace ${dias} día${dias>1?"s":""}`,
        accion: "inmuebles",
        color: "#8A1A1A",
        bg: "#FFD6D6"
      });
    }
  });

  // Inmuebles con coste reforma superior al presupuesto
  DB.inmuebles.forEach(im => {
    if (!im.presupuesto_reforma_inicial || im.estado === "Vendido") return;
    const desviac = im.coste_reforma - im.presupuesto_reforma_inicial;
    if (desviac > 0) {
      const pct = ((desviac / im.presupuesto_reforma_inicial)*100).toFixed(0);
      alertas.push({
        tipo: "presupuesto",
        icono: "💸",
        titulo: im.direccion,
        texto: `Reforma un ${pct}% sobre presupuesto (${fmt(desviac)} extra)`,
        accion: "inmuebles",
        color: "#8A1A1A",
        bg: "#FFD6D6"
      });
    }
  });

  // Inmuebles marcados como "En riesgo"
  DB.inmuebles.forEach(im => {
    if (im.estado !== "En riesgo") return;
    alertas.push({
      tipo: "estado",
      icono: "⚠️",
      titulo: im.direccion,
      texto: "Marcado como En riesgo",
      accion: "inmuebles",
      color: "#8A4A00",
      bg: "#FFE8CC"
    });
  });

  // Clientes con acción urgente pendiente
  DB.clientes.forEach(c => {
    if (!c.accion || c.estado === "Inactivo" || c.estado === "Descartado") return;
    const urgentes = ["Agendar Visita","Escalar a Gerencia","Confirmar Documentación"];
    if (urgentes.includes(c.accion)) {
      alertas.push({
        tipo: "cliente",
        icono: "👤",
        titulo: c.nombre,
        texto: `Acción pendiente: ${c.accion}`,
        accion: "clientes",
        color: "#1A4A9A",
        bg: "#D6E6FF"
      });
    }
  });

  // Clientes Alta Prioridad sin acción reciente
  DB.clientes.forEach(c => {
    if (c.clasificacion !== "Alta Prioridad" || c.estado !== "Activo") return;
    const tieneActividad = DB.llamadas.some(l => l.cliente_id === c.id) || DB.visitas.some(v => v.cliente_id === c.id);
    if (!tieneActividad) {
      alertas.push({
        tipo: "cliente",
        icono: "🔴",
        titulo: c.nombre,
        texto: "Alta Prioridad sin actividad registrada",
        accion: "clientes",
        color: "#8A1A1A",
        bg: "#FFD6D6"
      });
    }
  });

  if (alertas.length === 0) return "";

  return `<div style="background:#FAFAF7;border:1.5px solid #E8E4DC;border-radius:12px;overflow:hidden;margin-bottom:28px">
    <div style="background:#0F2340;padding:14px 20px;display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:16px">🚨</span>
        <span style="font-size:14px;font-weight:700;color:#fff">Alertas urgentes</span>
      </div>
      <span style="background:#C9974A;color:#fff;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px">${alertas.length}</span>
    </div>
    <div style="padding:12px 16px;display:flex;flex-direction:column;gap:8px">
      ${alertas.map(a => `
        <div onclick="navigate('${a.accion}')" style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:${a.bg};border-radius:8px;cursor:pointer;border-left:4px solid ${a.color}">
          <span style="font-size:18px;flex-shrink:0">${a.icono}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:700;color:#0F2340;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.titulo}</div>
            <div style="font-size:12px;color:${a.color};margin-top:1px">${a.texto}</div>
          </div>
          <span style="font-size:12px;color:${a.color};flex-shrink:0;font-weight:600">Ver →</span>
        </div>`).join("")}
    </div>
  </div>`;
}

function newCliente() {
  showModal("Nuevo cliente", clienteForm(), data => {

    data.presupuesto_hasta = Number(data.presupuesto_hasta)||0;

  });
}
function editCliente(id) {
  const c = DB.clientes.find(x=>String(x.id)===String(id));
  showModal("Editar cliente", clienteForm(c), data => {
    data.id = id;
    data.presupuesto_desde = Number(data.presupuesto_desde)||0;
    data.presupuesto_hasta = Number(data.presupuesto_hasta)||0;
    DB.clientes = DB.clientes.map(x=>String(x.id)===String(id)?data:x);
    saveItem("clientes", data, "UPDATE"); renderPage(); return true;
  });
}

      <div style="display:flex;justify-content:space-between;font-size:11px;color:#7A8499;margin-top:4px"><span>0%</span><span>25%</span><span>50%</span><span>75%</span><span>100%</span></div>`)}</div>
  </div>`;
}

function progressBar(im) {
  if (!im.fecha_compra || !im.fecha_objetivo) return "";
  const start = new Date(im.fecha_compra).getTime();
  const end = new Date(im.fecha_objetivo).getTime();
  const now = Date.now();
  const pct = Math.min(100,Math.max(0,((now-start)/(end-start))*100)).toFixed(0);
  const overdue = now > end && im.estado !== "Vendido";
  const col = overdue?"#8A1A1A":pct>75?"#C9974A":"#1A4A9A";
  const daysLeft = Math.ceil((end-now)/(1000*60*60*24));
  return `<div style="margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span style="font-size:11px;color:#7A8499;text-transform:uppercase;letter-spacing:.05em">Progreso temporal</span>
      <span style="font-size:12px;font-weight:700;color:${col}">${overdue?"⚠ Fecha superada":daysLeft>0?daysLeft+" días restantes":"Hoy es la fecha objetivo"}</span>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%;background:${col}"></div></div>
    <div style="display:flex;justify-content:space-between;margin-top:4px">
      <span style="font-size:11px;color:#7A8499">${im.fecha_compra}</span>
      <span style="font-size:11px;font-weight:700;color:${col}">${pct}%</span>
      <span style="font-size:11px;color:#7A8499">${im.fecha_objetivo}</span>
    </div>
  </div>`;
}

function avanceBar(im) {
  const av = im.grado_avance||0;
  const col = av===100?"#1A7A3C":av>=75?"#1A4A9A":av>=40?"#C9974A":"#8A1A1A";
  const lbl = av===100?"Completado":av>=75?"Avanzado":av>=40?"En curso":"Inicial";
  return `<div style="margin-bottom:14px;background:#F2EEE8;border-radius:10px;padding:12px 14px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-size:11px;color:#7A8499;text-transform:uppercase;letter-spacing:.05em">Grado de avance</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:11px;font-weight:600;color:${col};background:${col}22;padding:2px 8px;border-radius:10px">${lbl}</span>
        <span style="font-size:18px;font-weight:900;color:${col}">${av}%</span>
      </div>
    </div>
    <div class="progress-bar-wrap" style="height:12px;border-radius:6px"><div class="progress-bar" style="height:12px;border-radius:6px;width:${av}%;background:${col}"></div></div>
    <div style="display:flex;justify-content:space-between;margin-top:5px">
      ${[0,25,50,75,100].map(m=>`<span style="font-size:10px;color:${av>=m?col:"#B0AAA0"};font-weight:${av>=m?700:400}">${m}%</span>`).join("")}
    </div>
  </div>`;
}

function renderReportes() {
  const vendidos = DB.inmuebles.filter(i=>i.estado==="Vendido");
  const activos = DB.inmuebles.filter(i=>i.estado!=="Vendido");

// ── DELETE ────────────────────────────────────────────────────────────────────
function deleteItem(table, id) {
  if (!confirm("¿Eliminar este registro?")) return;
  const deleted = DB[table].find(x=>x.id===id);
  DB[table] = DB[table].filter(x=>String(x.id)!==String(id));
  saveItem(table, deleted||{id,_spId:null}, "DELETE");
  renderPage();
}

// ── EXPORT HELPERS ───────────────────────────────────────────────────────────
function downloadCSV(filename, rows) {
  const NL = String.fromCharCode(10);
  const csv = rows.map(function(r) {
    return r.map(function(c) {
      const s = String(c===null||c===undefined?"":c).replace(/"/g, "''");
      return (s.indexOf(",")>=0||s.indexOf('"')>=0) ? ('"'+s+'"') : s;
    }).join(",");
  }).join(NL);
  const blob = new Blob(["﻿"+csv], {type:"text/csv;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

        <td style="font-weight:700;color:${ben>0?"#1A7A3C":"#8A1A1A"}">${fmt(ben)}</td>
        <td style="font-weight:700">${roi}%</td>
      </tr>`;
    }).join("")}
  </table>`;
  printSection(html, "Listado Resumen de Inmuebles");
}

function exportResumenInmueblesCSV() {
  exportReporteGeneralCSV(); // Same data
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderPage(search="") {
  const map = {
    dashboard: renderDashboard,
    clientes: () => renderClientes(search),
    inmuebles: renderInmuebles,
    llamadas: renderLlamadas,
    visitas: renderVisitas,
    agentes: renderAgentes,
    reportes: renderReportes,
  };
  document.getElementById("content").innerHTML = (map[currentPage]||renderDashboard)();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadFromLocal();
renderNav();
renderPage();
// Check for SP token in URL hash after Microsoft redirect
const _parsed = spParseToken();
if (_parsed) {
  SP_TOKEN = _parsed;
  spInit();
} else {
  const _existing = spGetToken();
  if (_existing) {
    SP_TOKEN = _existing;
    spInit();
  }
}
</script>
